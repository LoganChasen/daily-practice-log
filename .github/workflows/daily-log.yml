name: Daily Log

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append to log
        run: echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> practice_log.md

      - name: Commit and push
        run: |
          git config user.name "LoganChasen"
          git config user.email "loganchasen06@gmail.com"
          git add practice_log.md
          git commit -m "daily log: $(date -u '+%Y-%m-%d')"
          git push
